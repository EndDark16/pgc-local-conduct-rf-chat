[build]
  publish = "web"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["artifacts/*.json", "models/metadata.json"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
